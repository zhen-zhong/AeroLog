name: aerolog

services:
  postgres:
    image: postgres:15-alpine
    container_name: aerolog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aerolog
      POSTGRES_PASSWORD: aerolog
      POSTGRES_DB: aerolog
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aerolog"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aerolog-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redpanda: Kafka 协议兼容，无 ZK，单机友好；生产可平滑迁移到 Kafka
  redpanda:
    image: redpandadata/redpanda:v24.3.5
    container_name: aerolog-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "19092:19092"   # 宿主机 Kafka API
      # Schema Registry (8081) 与 REST Proxy (8082) 仅容器内部使用，不映射到宿主机
      # 宿主机 8082 留给业务 API（server/api）
      - "9644:9644"     # Admin API
    volumes:
      - ./data/redpanda:/var/lib/redpanda/data

  redpanda-console:
    image: redpandadata/console:v2.6.0
    container_name: aerolog-redpanda-console
    restart: unless-stopped
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8088:8080"

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: aerolog-clickhouse
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: aerolog
      CLICKHOUSE_USER: aerolog
      CLICKHOUSE_PASSWORD: aerolog
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./init/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: aerolog-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aerolog
      MINIO_ROOT_PASSWORD: aerolog123
    ports:
      - "9002:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - ./data/minio:/data

  # Prometheus：拉取 collector/consumer/api 的 /metrics
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: aerolog-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus

  # Grafana：预置 Prometheus 数据源 + AeroLog 面板
  grafana:
    image: grafana/grafana:11.0.0
    container_name: aerolog-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./data/grafana:/var/lib/grafana
