name: aerolog

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
      - collector
      - grafana
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./queue.htpasswd:/etc/nginx/queue.htpasswd:ro
    networks:
      - edge
      - internal
    mem_limit: 48m

  web:
    build:
      context: ../..
      dockerfile: deploy/production/Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE: /api
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: /api
    networks:
      - internal
    mem_limit: 192m

  api:
    build:
      context: ../..
      dockerfile: deploy/production/Dockerfile.go
      args:
        SERVICE: api
    restart: unless-stopped
    env_file: ${AEROLOG_ENV_FILE:-.env}
    environment:
      AEROLOG_API_ADDR: ":8082"
      AEROLOG_METRICS_ADDR: ":9103"
      AEROLOG_PG_DSN: postgres://aerolog:${POSTGRES_PASSWORD}@postgres:5432/aerolog?sslmode=disable
      AEROLOG_CH_ADDR: clickhouse:9000
      AEROLOG_CH_DB: aerolog
      AEROLOG_CH_USER: aerolog
      AEROLOG_CH_PASSWORD: ${CLICKHOUSE_PASSWORD}
      AEROLOG_CORS: "*"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - internal
    mem_limit: 192m

  collector:
    build:
      context: ../..
      dockerfile: deploy/production/Dockerfile.go
      args:
        SERVICE: collector
    restart: unless-stopped
    env_file: ${AEROLOG_ENV_FILE:-.env}
    environment:
      AEROLOG_ADDR: ":8081"
      AEROLOG_METRICS_ADDR: ":9101"
      AEROLOG_KAFKA_BROKERS: redpanda:9092
      AEROLOG_PG_DSN: postgres://aerolog:${POSTGRES_PASSWORD}@postgres:5432/aerolog?sslmode=disable
      AEROLOG_REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    mem_limit: 144m

  consumer:
    build:
      context: ../..
      dockerfile: deploy/production/Dockerfile.go
      args:
        SERVICE: consumer
    restart: unless-stopped
    env_file: ${AEROLOG_ENV_FILE:-.env}
    environment:
      AEROLOG_KAFKA_BROKERS: redpanda:9092
      AEROLOG_CH_ADDR: clickhouse:9000
      AEROLOG_CH_DB: aerolog
      AEROLOG_CH_USER: aerolog
      AEROLOG_CH_PASSWORD: ${CLICKHOUSE_PASSWORD}
      AEROLOG_PG_DSN: postgres://aerolog:${POSTGRES_PASSWORD}@postgres:5432/aerolog?sslmode=disable
      AEROLOG_METRICS_ADDR: ":9102"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - internal
    mem_limit: 176m

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aerolog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aerolog
    volumes:
      - /var/lib/aerolog/postgres:/var/lib/postgresql/data
      - ../init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aerolog"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - internal
    mem_limit: 256m

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /var/lib/aerolog/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - internal
    mem_limit: 80m

  redpanda:
    image: redpandadata/redpanda:v24.3.5
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=768M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    volumes:
      - /var/lib/aerolog/redpanda:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --api-urls=localhost:9644"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - internal
    mem_limit: 900m

  redpanda-console:
    image: redpandadata/console:v2.6.0
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      SERVER_BASEPATH: /queue
      SERVER_SETBASEPATHFROMXFORWARDEDPREFIX: "true"
    networks:
      - internal
    mem_limit: 128m

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: aerolog
      CLICKHOUSE_USER: aerolog
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - /var/lib/aerolog/clickhouse:/var/lib/clickhouse
      - ../init/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 18
    networks:
      - internal
    mem_limit: 768m

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /var/lib/aerolog/prometheus:/prometheus
    networks:
      - internal
    mem_limit: 220m

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: 17638732656@163.com
      GF_SECURITY_ADMIN_PASSWORD: ${AEROLOG_BOOTSTRAP_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: 82.156.142.135
      GF_SERVER_ROOT_URL: http://82.156.142.135/monitor/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - /var/lib/aerolog/grafana:/var/lib/grafana
    networks:
      - internal
    mem_limit: 180m

networks:
  edge:
  internal:
    internal: true
