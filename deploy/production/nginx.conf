server {
    listen 80;
    server_name liyang.live www.liyang.live _;
    client_max_body_size 6m;

    location /api/ {
        proxy_pass http://api:8082/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/ {
        default_type application/json;
        return 200 '{"ok":true,"service":"aerolog-api","health":"/api/healthz"}';
    }

    location = /aerolg {
        return 302 /;
    }

    location = /aerolg/ {
        return 302 /;
    }

    location = /aerolog {
        return 302 /;
    }

    location = /aerolog/ {
        return 302 /;
    }

    # SDK events are accepted through /collect/v1/track. The collector itself
    # remains private to the Docker network.
    location /collect/ {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, X-AeroLog-SDK, X-AeroLog-Token" always;
        add_header Access-Control-Max-Age "86400" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://collector:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # The open-source Console frontend probes its enterprise user endpoint.
    # Return the same local-user shape it expects when no RBAC provider is
    # configured, instead of surfacing the backend's unsupported-method 405.
    location = /queue/api/users/me {
        auth_basic "AeroLog queue console";
        auth_basic_user_file /etc/nginx/queue.htpasswd;
        default_type application/json;
        return 200 '{"canViewConsoleUsers":false,"canListAcls":true,"canListQuotas":true,"canPatchConfigs":true,"canReassignPartitions":true,"canCreateSchemas":true,"canDeleteSchemas":true,"canManageSchemaRegistry":true,"canViewSchemas":true,"seat":null,"user":{"providerID":-1,"providerName":"local proxy","id":"local","internalIdentifier":"local","meta":{"avatarUrl":"","email":"","name":"Local Console Administrator"}}}';
    }

    # The public news feed is optional and blocked in some networks. Serve an
    # empty local list so the Console does not issue a cross-origin request.
    location = /queue/rp-console.json {
        auth_basic "AeroLog queue console";
        auth_basic_user_file /etc/nginx/queue.htpasswd;
        default_type application/json;
        return 200 '[]';
    }

    # The queue console is intentionally reverse-proxied and protected instead
    # of exposing its native port to the public internet.
    location /queue/ {
        auth_basic "AeroLog queue console";
        auth_basic_user_file /etc/nginx/queue.htpasswd;
        proxy_pass http://redpanda-console:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /queue;
        sub_filter_once on;
        sub_filter_types application/javascript text/javascript;
        sub_filter 'https://resources.redpanda.com/rp-console.json' './rp-console.json';
    }

    location = /monitor {
        return 301 /monitor/;
    }

    # Grafana remains on the private Docker network and is protected by the
    # same administrator gate as the queue console.
    location /monitor/ {
        auth_basic "AeroLog monitoring";
        auth_basic_user_file /etc/nginx/queue.htpasswd;
        # Preserve /monitor/ because Grafana is configured to serve from this
        # subpath and uses it for its own login and asset routes.
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /monitor;
    }

    location = /tools {
        return 301 /tools/;
    }

    location = /tools/ {
        default_type text/html;
        return 200 '<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AeroLog Tools</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#e5e7eb}main{max-width:760px;margin:0 auto;padding:64px 24px}.brand{color:#93c5fd;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}h1{font-size:40px;line-height:1.1;margin:12px 0 14px}p{color:#cbd5e1;line-height:1.7}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:28px}a.card{display:block;border:1px solid #334155;border-radius:12px;padding:20px;background:#111827;color:inherit;text-decoration:none}a.card:hover{border-color:#60a5fa;background:#172033}.name{font-size:18px;font-weight:700}.path{margin-top:8px;color:#93c5fd;font-family:ui-monospace,Menlo,monospace;font-size:13px}</style></head><body><main><div class="brand">AeroLog Tools</div><h1>工具集</h1><p>这里收纳独立工具项目。工具入口不需要 AeroLog 登录。</p><div class="grid"><a class="card" href="/tools/movie/"><div class="name">Movie</div><div class="path">/tools/movie/</div></a></div></main></body></html>';
    }

    location = /tools/movie {
        return 301 /tools/movie/;
    }

    location = /tools/moive {
        return 301 /tools/movie/;
    }

    location /tools/moive/ {
        return 301 /tools/movie/;
    }

    location /tools/movie/ {
        proxy_pass http://aerolog-tools-movie/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /tools/movie;
    }

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
