server {
    listen 80;
    server_name _;
    client_max_body_size 6m;

    location /api/ {
        proxy_pass http://api:8082/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SDK events are accepted through /collect/v1/track. The collector itself
    # remains private to the Docker network.
    location /collect/ {
        proxy_pass http://collector:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # The open-source Console frontend probes its enterprise user endpoint.
    # Return the same local-user shape it expects when no RBAC provider is
    # configured, instead of surfacing the backend's unsupported-method 405.
    location = /queue/api/users/me {
        auth_basic "AeroLog queue console";
        auth_basic_user_file /etc/nginx/queue.htpasswd;
        default_type application/json;
        return 200 '{"canViewConsoleUsers":false,"canListAcls":true,"canListQuotas":true,"canPatchConfigs":true,"canReassignPartitions":true,"canCreateSchemas":true,"canDeleteSchemas":true,"canManageSchemaRegistry":true,"canViewSchemas":true,"seat":null,"user":{"providerID":-1,"providerName":"local proxy","id":"local","internalIdentifier":"local","meta":{"avatarUrl":"","email":"","name":"Local Console Administrator"}}}';
    }

    # The public news feed is optional and blocked in some networks. Serve an
    # empty local list so the Console does not issue a cross-origin request.
    location = /queue/rp-console.json {
        auth_basic "AeroLog queue console";
        auth_basic_user_file /etc/nginx/queue.htpasswd;
        default_type application/json;
        return 200 '[]';
    }

    # The queue console is intentionally reverse-proxied and protected instead
    # of exposing its native port to the public internet.
    location /queue/ {
        auth_basic "AeroLog queue console";
        auth_basic_user_file /etc/nginx/queue.htpasswd;
        proxy_pass http://redpanda-console:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /queue;
        sub_filter_once on;
        sub_filter_types application/javascript text/javascript;
        sub_filter 'https://resources.redpanda.com/rp-console.json' './rp-console.json';
    }

    location = /monitor {
        return 301 /monitor/;
    }

    # Grafana remains on the private Docker network and is protected by the
    # same administrator gate as the queue console.
    location /monitor/ {
        auth_basic "AeroLog monitoring";
        auth_basic_user_file /etc/nginx/queue.htpasswd;
        # Preserve /monitor/ because Grafana is configured to serve from this
        # subpath and uses it for its own login and asset routes.
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /monitor;
    }

    location = /tools/moive {
        return 301 /tools/moive/;
    }

    location /tools/moive/ {
        proxy_pass http://aerolog-tools-moive/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /tools/moive;
    }

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
